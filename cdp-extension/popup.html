<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 640px;
  height: 400px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #f5f7fa;
  color: #333;
  overflow: hidden;
  user-select: none;
}

.container {
  padding: 22px 32px 18px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid #e8ecf1;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, #5b7cfa 0%, #8b5cf6 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  box-shadow: 0 4px 12px rgba(91,124,250,0.3);
}

.brand-text {
  display: flex;
  flex-direction: column;
}

.brand-name {
  font-size: 15px;
  font-weight: 700;
  color: #1a1a2e;
  letter-spacing: 0.3px;
}

.brand-ver {
  font-size: 10px;
  color: #999;
  margin-top: 1px;
}

/* Status Card */
.status-card {
  background: #fff;
  border: 1px solid #e8ecf1;
  border-radius: 14px;
  padding: 14px 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}

.status-dot-col {
  display: flex;
  align-items: center;
  gap: 16px;
}

.status-indicator {
  position: relative;
  width: 14px;
  height: 14px;
}

.dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: block;
  position: relative;
}

.dot.on {
  background: #10b981;
  box-shadow: 0 0 12px rgba(16,185,129,0.5);
}

.dot.on::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid rgba(16,185,129,0.25);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.4); opacity: 0; }
}

.dot.off {
  background: #ef4444;
  box-shadow: 0 0 8px rgba(239,68,68,0.35);
}

.status-info {
  display: flex;
  flex-direction: column;
}

.status-label {
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.status-text {
  font-size: 15px;
  font-weight: 600;
  margin-top: 2px;
}

.status-text.connected {
  color: #10b981;
}

.status-text.disconnected {
  color: #ef4444;
}

.status-badge {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
}

.status-badge.on {
  background: #ecfdf5;
  color: #10b981;
  border: 1px solid #a7f3d0;
}

.status-badge.off {
  background: #fef2f2;
  color: #ef4444;
  border: 1px solid #fecaca;
}

/* Info rows */
.info-section {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  border-radius: 10px;
  padding: 10px 14px;
  border: 1px solid #e8ecf1;
  box-shadow: 0 1px 4px rgba(0,0,0,0.03);
}

.info-label {
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.info-value {
  font-size: 12px;
  color: #555;
  font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
  background: #f0f2f5;
  padding: 3px 8px;
  border-radius: 5px;
}

.info-value.port {
  color: #d97706;
}

.info-value.target {
  color: #2563eb;
}

/* Features section */
.features-title {
  font-size: 11px;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.feature-cards {
  display: flex;
  gap: 10px;
  flex: 1;
  padding-bottom: 2px;
}

.feature-card {
  flex: 1;
  background: #fff;
  border: 1px solid #e8ecf1;
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.feature-card-icon {
  font-size: 18px;
  margin-bottom: 6px;
}

.feature-card-label {
  font-size: 12px;
  font-weight: 600;
  color: #444;
}

.feature-card-desc {
  font-size: 10px;
  color: #aaa;
  margin-top: 2px;
}

/* Footer */
.footer {
  text-align: center;
  font-size: 10px;
  color: #bbb;
  padding-top: 10px;
  border-top: 1px solid #e8ecf1;
}
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="brand">
      <div class="logo">CD</div>
      <div class="brand-text">
        <span class="brand-name">CDP Bridge</span>
        <span class="brand-ver">v2.0.0 · Developer Tool</span>
      </div>
    </div>
  </div>

  <!-- Status Card -->
  <div class="status-card">
    <div class="status-dot-col">
      <div class="status-indicator">
        <span class="dot off" id="statusDot"></span>
      </div>
      <div class="status-info">
        <span class="status-label">Connection</span>
        <span class="status-text disconnected" id="statusText">未连接</span>
      </div>
    </div>
    <span class="status-badge off" id="statusBadge">OFFLINE</span>
  </div>

  <!-- Info -->
  <div class="info-section">
    <div class="info-row">
      <span class="info-label">WebSocket</span>
      <span class="info-value target">ws://127.0.0.1:18765</span>
    </div>
    <div class="info-row">
      <span class="info-label">Protocol</span>
      <span class="info-value port">Chrome DevTools Protocol</span>
    </div>
  </div>

  <!-- 功能卡片 -->
  <div class="features-title">功能概览</div>
  <div class="feature-cards">
    <div class="feature-card">
      <div class="feature-card-icon">⚡</div>
      <div class="feature-card-label">CDP 命令</div>
      <div class="feature-card-desc">执行 DevTools 协议</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-icon">📜</div>
      <div class="feature-card-label">JS 注入</div>
      <div class="feature-card-desc">运行任意脚本</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-icon">📦</div>
      <div class="feature-card-label">批量执行</div>
      <div class="feature-card-desc">顺序命令执行</div>
    </div>
    <div class="feature-card">
      <div class="feature-card-icon">📑</div>
      <div class="feature-card-label">标签页管理</div>
      <div class="feature-card-desc">查询与切换</div>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
