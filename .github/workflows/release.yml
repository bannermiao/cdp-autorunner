name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile all platforms
        run: |
          cd cdp-server
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -o cdp-server-linux-amd64     .
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -o cdp-server-darwin-arm64    .
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -o cdp-server-darwin-amd64    .
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o cdp-server-win-x64.exe     .
          gzip -c cdp-server-linux-amd64  > cdp-server-linux-amd64.gz
          gzip -c cdp-server-darwin-arm64 > cdp-server-darwin-arm64.gz
          gzip -c cdp-server-darwin-amd64 > cdp-server-darwin-amd64.gz
          ls -lh

      - name: Upload binaries to Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "cdp-server/cdp-server-*"
          token: ${{ github.token }}
          generateReleaseNotes: true
          allowUpdates: true
          replacesArtifacts: true
